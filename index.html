<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enrico — Registro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink: #12151c;
    --ink-raised: #171b23;
    --paper: #ede8dd;
    --paper-dim: #8b8d93;
    --signal: #4fd8c4;
    --flag: #e0a458;
    --line: rgba(237,232,221,0.12);
    --line-strong: rgba(237,232,221,0.22);
  }

  *{ box-sizing: border-box; }

  html{ scroll-behavior: smooth; }

  body{
    margin: 0;
    background: var(--ink);
    color: var(--paper);
    font-family: 'IBM Plex Sans', sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  a{ color: inherit; }

  .wrap{
    max-width: 760px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* status bar */
  .statusbar{
    border-bottom: 1px solid var(--line);
  }
  .statusbar-inner{
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px 18px;
    padding: 14px 24px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.04em;
    color: var(--paper-dim);
    max-width: 760px;
    margin: 0 auto;
  }
  .dot{
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--signal);
    box-shadow: 0 0 0 3px rgba(79,216,196,0.15);
    margin-right: 7px;
    flex-shrink: 0;
  }
  .statusbar-inner span.sep{ color: var(--line-strong); }

  /* hero */
  .hero{
    padding: 64px 0 40px;
  }
  .hero h1{
    font-family: 'Fraunces', serif;
    font-optical-sizing: auto;
    font-weight: 600;
    font-size: clamp(38px, 7vw, 56px);
    letter-spacing: -0.01em;
    margin: 0 0 14px;
  }
  .hero p{
    font-size: 16px;
    color: var(--paper-dim);
    max-width: 46ch;
    margin: 0;
  }

  /* log */
  .log{
    border-top: 1px solid var(--line-strong);
    padding: 8px 0 60px;
  }
  .entry{
    display: grid;
    grid-template-columns: 56px 1fr auto;
    align-items: start;
    gap: 4px 18px;
    padding: 26px 0;
    border-bottom: 1px solid var(--line);
    text-decoration: none;
    transition: background 0.15s ease;
  }
  @media (prefers-reduced-motion: reduce){
    .entry{ transition: none; }
  }
  .entry:hover, .entry:focus-visible{
    background: var(--ink-raised);
    margin: 0 -16px;
    padding-left: 16px;
    padding-right: 16px;
    border-radius: 4px;
    outline: none;
  }
  .entry:focus-visible{
    box-shadow: 0 0 0 2px var(--signal);
  }
  .entry-index{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--paper-dim);
    padding-top: 4px;
  }
  .entry-index .status-dot{
    display: block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-bottom: 8px;
  }
  .entry-index .status-dot.live{ background: var(--signal); }
  .entry-index .status-dot.draft{ background: var(--flag); }

  .entry-title{
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 19px;
    margin: 0 0 6px;
  }
  .entry-desc{
    font-size: 14.5px;
    color: var(--paper-dim);
    margin: 0 0 10px;
    max-width: 52ch;
  }
  .entry-tags{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11.5px;
    color: var(--flag);
    letter-spacing: 0.02em;
  }
  .entry-tags span{ margin-right: 10px; }

  .entry-date{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--paper-dim);
    white-space: nowrap;
    padding-top: 4px;
  }

  .entry-arrow{
    display: none;
  }

  /* empty state */
  .empty{
    padding: 48px 0;
    color: var(--paper-dim);
  }
  .empty p{
    margin: 0 0 6px;
    font-size: 15px;
  }
  .empty code{
    font-family: 'IBM Plex Mono', monospace;
    background: var(--ink-raised);
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 13px;
    color: var(--paper);
  }

  footer{
    border-top: 1px solid var(--line);
    padding: 22px 0 40px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11.5px;
    color: var(--paper-dim);
    letter-spacing: 0.02em;
  }

  @media (max-width: 560px){
    .entry{
      grid-template-columns: 40px 1fr;
    }
    .entry-date{
      grid-column: 2;
      padding-top: 0;
    }
  }
</style>
</head>
<body>

  <div class="statusbar">
    <div class="statusbar-inner">
      <span><span class="dot"></span>SISTEMA ONLINE</span>
      <span class="sep">/</span>
      <span id="status-count">0 VOCI REGISTRATE</span>
      <span class="sep">/</span>
      <span>OSPITATO SU GITHUB PAGES</span>
    </div>
  </div>

  <div class="wrap">
    <div class="hero">
      <h1>Enrico —</h1>
      <p>Un registro di pagine, esperimenti e cose che pubblico qui via via che le costruisco. Niente di sistematico: solo un posto dove finiscono.</p>
    </div>

    <div class="log" id="log"></div>
  </div>

  <footer>
    <div class="wrap">registro statico — nessun server, nessun database, solo file</div>
  </footer>

<script>
  /*
    COME AGGIUNGERE UNA NUOVA VOCE
    -------------------------------
    Aggiungi un nuovo oggetto in CIMA all'array "entries" qui sotto
    (ordine cronologico inverso: la voce più recente sta per prima).

    Campi:
      title       -> titolo della voce
      description -> una riga di descrizione
      url         -> link alla pagina/artifact (relativo, es. "compleanno-luigi/")
      date        -> data leggibile, es. "12 lug 2026"
      tags        -> array di stringhe, es. ["html", "compleanno"]
      status      -> "live" (pubblicata) oppure "draft" (bozza, non ancora online)

    Esempio:
      {
        title: "Compleanno di Luigi",
        description: "Un sito compleanno con countdown e una fotogallery.",
        url: "compleanno-luigi/",
        date: "12 lug 2026",
        tags: ["html", "compleanno"],
        status: "live"
      },
  */
  const entries = [
    // <- aggiungi qui le nuove voci, una virgola dopo l'altra
  ];

  const logEl = document.getElementById('log');
  const countEl = document.getElementById('status-count');

  countEl.textContent = entries.length + (entries.length === 1 ? ' VOCE REGISTRATA' : ' VOCI REGISTRATE');

  if (entries.length === 0){
    logEl.innerHTML = `
      <div class="empty">
        <p>Nessuna voce ancora.</p>
        <p>Aggiungi la prima modificando l'array <code>entries</code> in fondo a questo file.</p>
      </div>
    `;
  } else {
    entries.forEach((e, i) => {
      const index = String(entries.length - i).padStart(3, '0');
      const tags = (e.tags || []).map(t => `<span>#${t}</span>`).join('');
      const statusClass = e.status === 'draft' ? 'draft' : 'live';

      const a = document.createElement('a');
      a.className = 'entry';
      a.href = e.url || '#';

      a.innerHTML = `
        <div class="entry-index">
          <span class="status-dot ${statusClass}"></span>
          ${index}
        </div>
        <div>
          <h2 class="entry-title">${e.title}</h2>
          <p class="entry-desc">${e.description || ''}</p>
          <div class="entry-tags">${tags}</div>
        </div>
        <div class="entry-date">${e.date || ''}</div>
      `;

      logEl.appendChild(a);
    });
  }
</script>

</body>
</html>
