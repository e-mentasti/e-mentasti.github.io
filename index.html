<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quanto manca</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* =========================================================
     COSA MODIFICARE — tutto quello che ti serve è qui in cima.
     Ogni evento ha: titolo, sottotitolo, data/ora, emoji, tema.
     Formato data: anno, mese (1-12), giorno, ora, minuto.
     ========================================================= */

  :root{
    --bg: #0f0e17;
    --card: #1a1826;
    --card-hi: #221f31;
    --ink: #fff7f0;
    --dim: #9b95ad;
    --line: rgba(255,247,240,0.08);

    --sardegna: #f4a259;
    --cani: #6ee7b7;
    --noi: #f472b6;
  }

  *{ box-sizing: border-box; margin: 0; padding: 0; }

  html, body{ height: 100%; }

  body{
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    position: relative;
  }

  #hearts{
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 50;
    overflow: hidden;
  }
  .heart{
    position: absolute;
    font-size: 22px;
    animation: rise 2.4s ease-out forwards;
    will-change: transform, opacity;
  }
  @keyframes rise{
    0%{ transform: translateY(0) scale(0.6) rotate(0deg); opacity: 1; }
    100%{ transform: translateY(-70vh) scale(1.1) rotate(var(--r)); opacity: 0; }
  }

  .wrap{
    max-width: 640px;
    margin: 0 auto;
    padding: 42px 22px 60px;
    position: relative;
    z-index: 1;
  }

  header{ margin-bottom: 34px; }
  .eyebrow{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 10px;
  }
  h1{
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: clamp(30px, 8vw, 42px);
    letter-spacing: -0.01em;
    line-height: 1.05;
  }
  h1 .amp{ color: var(--noi); font-style: italic; }

  .cards{
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .card{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 22px 22px 20px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.35s cubic-bezier(.2,.8,.2,1),
                background 0.3s ease,
                border-color 0.3s ease;
    will-change: transform;
  }
  @media (prefers-reduced-motion: reduce){
    .card{ transition: background 0.2s ease, border-color 0.2s ease; }
    .heart{ animation: none; display: none; }
  }
  .card:hover{ border-color: rgba(255,247,240,0.16); }
  .card:focus-visible{ outline: 2px solid var(--ink); outline-offset: 3px; }

  .card::before{
    content:"";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: var(--accent);
  }

  .card[data-focus="true"]{
    background: var(--card-hi);
    border-color: color-mix(in srgb, var(--accent) 40%, transparent);
    transform: scale(1.015);
  }
  .card[data-dim="true"]{ opacity: 0.62; }

  .card-top{
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
  }
  .emoji{
    font-size: 26px;
    line-height: 1;
    filter: saturate(1.1);
  }
  .titles{ flex: 1; min-width: 0; }
  .card-title{
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 20px;
    color: var(--accent);
  }
  .card-sub{
    font-size: 13px;
    color: var(--dim);
    margin-top: 2px;
  }
  .tag{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.08em;
    color: var(--dim);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 4px 9px;
    white-space: nowrap;
  }

  .clock{
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  .unit{ text-align: center; }
  .num{
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 500;
    font-size: clamp(24px, 8vw, 34px);
    color: var(--ink);
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .lbl{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--dim);
    margin-top: 7px;
  }

  .arrived{
    text-align: center;
    padding: 6px 0 2px;
  }
  .arrived .big{
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 26px;
    color: var(--accent);
  }
  .arrived .small{
    font-size: 13px;
    color: var(--dim);
    margin-top: 4px;
  }

  .hint{
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    margin-top: 30px;
    letter-spacing: 0.04em;
  }
  .hint i{ opacity: 0.7; }
</style>
</head>
<body>

<div id="hearts" aria-hidden="true"></div>

<div class="wrap">
  <header>
    <div class="eyebrow">quanto manca a…</div>
    <h1>Le nostre <span class="amp">prossime</span> volte</h1>
  </header>

  <div class="cards" id="cards"></div>

  <p class="hint">tocca una tessera per metterla a fuoco · tocca lo sfondo per un piccolo saluto <i>♥</i></p>
</div>

<script>
  /* -------- gli eventi (modifica qui) -------- */
  const EVENTS = [
    {
      id: "noi",
      title: "Ci rivediamo",
      sub: "finalmente, di persona",
      emoji: "🫂",
      tag: "VEN 20:30",
      accent: getComputedStyle(document.documentElement).getPropertyValue('--noi'),
      date: new Date(2026, 6, 10, 20, 30, 0),
      arrived: { big: "Sei qui.", small: "il resto può aspettare" }
    },
    {
      id: "cani",
      title: "Concerto dei Cani",
      sub: "in piedi, a cantare male insieme",
      emoji: "🎸",
      tag: "DOM 20:00",
      accent: getComputedStyle(document.documentElement).getPropertyValue('--cani'),
      date: new Date(2026, 6, 12, 20, 0, 0),
      arrived: { big: "Si suona!", small: "occhio agli assoli" }
    },
    {
      id: "sardegna",
      title: "Sardegna",
      sub: "mare, sole, zero sveglie",
      emoji: "🏖️",
      tag: "3 AGO 15:00",
      accent: getComputedStyle(document.documentElement).getPropertyValue('--sardegna'),
      date: new Date(2026, 7, 3, 15, 0, 0),
      arrived: { big: "Si parte!", small: "hai preso il costume?" }
    }
  ];

  const cardsEl = document.getElementById('cards');
  const heartsEl = document.getElementById('hearts');
  let focused = null;

  EVENTS.forEach(ev => {
    const c = document.createElement('div');
    c.className = 'card';
    c.style.setProperty('--accent', ev.accent.trim());
    c.setAttribute('tabindex', '0');
    c.setAttribute('role', 'button');
    c.dataset.id = ev.id;
    c.innerHTML = `
      <div class="card-top">
        <span class="emoji">${ev.emoji}</span>
        <div class="titles">
          <div class="card-title">${ev.title}</div>
          <div class="card-sub">${ev.sub}</div>
        </div>
        <span class="tag">${ev.tag}</span>
      </div>
      <div class="body" data-body="${ev.id}"></div>
    `;
    const toggle = (e) => {
      e.stopPropagation();
      focused = (focused === ev.id) ? null : ev.id;
      applyFocus();
    };
    c.addEventListener('click', toggle);
    c.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(e); }
    });
    cardsEl.appendChild(c);
  });

  function applyFocus(){
    document.querySelectorAll('.card').forEach(c => {
      const isF = c.dataset.id === focused;
      c.dataset.focus = focused ? String(isF) : "false";
      c.dataset.dim = (focused && !isF) ? "true" : "false";
    });
  }

  function pad(n){ return String(n).padStart(2, '0'); }

  function render(){
    const now = new Date();
    EVENTS.forEach(ev => {
      const body = document.querySelector(`[data-body="${ev.id}"]`);
      let diff = ev.date - now;
      if (diff <= 0){
        body.innerHTML = `
          <div class="arrived">
            <div class="big">${ev.arrived.big}</div>
            <div class="small">${ev.arrived.small}</div>
          </div>`;
        return;
      }
      const d = Math.floor(diff / 86400000); diff -= d*86400000;
      const h = Math.floor(diff / 3600000);  diff -= h*3600000;
      const m = Math.floor(diff / 60000);    diff -= m*60000;
      const s = Math.floor(diff / 1000);
      body.innerHTML = `
        <div class="clock">
          <div class="unit"><div class="num">${d}</div><div class="lbl">giorni</div></div>
          <div class="unit"><div class="num">${pad(h)}</div><div class="lbl">ore</div></div>
          <div class="unit"><div class="num">${pad(m)}</div><div class="lbl">min</div></div>
          <div class="unit"><div class="num">${pad(s)}</div><div class="lbl">sec</div></div>
        </div>`;
    });
  }

  render();
  setInterval(render, 1000);

  /* -------- cuoricini al tocco sullo sfondo -------- */
  const GLYPHS = ['♥','💛','💚','💗'];
  function spawnHearts(x, y){
    const n = 5 + Math.floor(Math.random()*3);
    for (let i=0; i<n; i++){
      const h = document.createElement('span');
      h.className = 'heart';
      h.textContent = GLYPHS[Math.floor(Math.random()*GLYPHS.length)];
      const dx = (Math.random()-0.5) * 120;
      h.style.left = (x + dx) + 'px';
      h.style.top = y + 'px';
      h.style.setProperty('--r', (Math.random()*80-40) + 'deg');
      h.style.animationDelay = (Math.random()*0.15) + 's';
      h.style.fontSize = (16 + Math.random()*14) + 'px';
      heartsEl.appendChild(h);
      setTimeout(() => h.remove(), 2700);
    }
  }

  document.body.addEventListener('click', (e) => {
    if (e.target.closest('.card')) return;
    spawnHearts(e.clientX, e.clientY);
  });
  document.body.addEventListener('touchstart', (e) => {
    if (e.target.closest('.card')) return;
    const t = e.touches[0];
    if (t) spawnHearts(t.clientX, t.clientY);
  }, { passive: true });
</script>

</body>
</html>
